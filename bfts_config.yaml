# path to the task data directory
data_dir: "data"
preprocess_data: False

goal: null
eval: null

log_dir: logs
workspace_dir: workspaces

# whether to copy the data to the workspace directory (otherwise it will be symlinked)
# copying is recommended to prevent the agent from accidentally modifying the original data
copy_data: True

exp_name: run # a random experiment name will be generated if not provided

# settings for code execution
exec:
  timeout: 3600
  agent_file_name: runfile.py
  format_tb_ipython: False

generate_report: True
# LLM settings for final report from journal
report:
  model: ollama/qwen3:32b
  temp: 1.0

experiment:
  num_syn_datasets: 1

debug:
  stage4: False

# agent hyperparams
agent:
  type: parallel
  num_workers: 1 #2 #4
  stages:
    stage1_max_iters: 20
    stage2_max_iters: 12
    stage3_max_iters: 12
    stage4_max_iters: 18
  # how many improvement iterations to run
  steps: 5 # if stage-specific max_iters are not provided, the agent will use this value for all stages
  # whether to instruct the agent to use CV (set to 1 to disable)
  k_fold_validation: 1
  multi_seed_eval:
    num_seeds: 3 # should be the same as num_workers if num_workers < 3. Otherwise, set it to be 3.
  # whether to instruct the agent to generate a prediction function
  expose_prediction: False
  # whether to provide the agent with a preview of the data
  data_preview: False

  # LLM settings for coding
  code:
    model: ollama/qwen3:32b # qwen3-coder:30b returns empty content on long BFTS code prompts.
    temp: 0.2
    max_tokens: 12000
    mode: sequential_multi
    sequential_multi:
      max_review_rounds: 1
      max_repair_rounds: 3
      run_py_compile: true
      run_import_check: true
      reject_synthetic_only: true
      run_smoke_test: true
      smoke_test_timeout: 60
      require_experiment_data: true
      use_tool_loop: true
      tool_repair_on_validation_failure: true
      debug_with_tool_repair: true
      tool_loop:
        max_tool_steps: 8
        max_read_chars: 8000
        max_rg_results: 30
        allowed_tools:
          - list_files
          - read_file
          - rg
          - inspect_input
          - inspect_requirements
          - inspect_imports
          - finish
      reviewers:
        - PackageReviewer
        - DataReviewer
        - TorchShapeReviewer
        - MetricReviewer

  # LLM settings for evaluating program output / tracebacks
  feedback:
    model: ollama/qwen3:32b
    # gpt-4o
    temp: 0.5
    max_tokens: 8192

  vlm_feedback:
    model: ollama/qwen3:32b
    temp: 0.5
    max_tokens: null

  search:
    max_debug_depth: 3
    debug_prob: 0.5
    num_drafts: 3

  # Options for summarizing findings and selecting the best node
  # If not specified, the default behavior will be used.

  summary:
    model: ollama/qwen3:32b
    temp: 0.3

  select_node:
    model: ollama/qwen3:32b
    temp: 0.3
